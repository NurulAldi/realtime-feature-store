services:
  zookeeper:
    # Menggunakan Public ECR Bitnami (Lebih stabil dari Docker Hub)
    image: public.ecr.aws/bitnami/zookeeper:3.9
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.7
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    depends_on:
      - zookeeper

  redis:
    image: public.ecr.aws/docker/library/redis:7.2-alpine
    ports:
      - "6379:6379"

  flink-jobmanager:
    image: public.ecr.aws/docker/library/flink:1.18
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./lib:/opt/flink/usrlib
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: public.ecr.aws/docker/library/flink:1.18
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - ./lib:/opt/flink/usrlib
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2